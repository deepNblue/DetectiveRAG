# 侦探推理RAG系统 - 优化配置
# 仅使用可用的GLM-5.1模型

# LLM配置 - 使用智谱AI Coding Plan API
llm:
  # 主LLM模型（文本生成）
  provider: "zhipu"  # 智谱AI
  model: "glm-5.1"  # ✅ GLM-5.1模型（已验证可用）
  api_key: "${ZHIPUAI_API_KEY}"  # 从环境变量读取
  base_url: "https://open.bigmodel.cn/api/coding/paas/v4"  # Coding Plan API
  temperature: 0.7
  max_tokens: 2000
  timeout: 30
  
  # 备用LLM（本地vLLM服务）
  fallback:
    enabled: true
    provider: "vllm"
    model: "qwen3-30b-a3b"
    base_url: "${VLLM_BASE_URL:http://localhost:8094/v1}"
    api_key: "${VLLM_API_KEY:}"

# 多模态配置
multimodal:
  enabled: false  # 暂时禁用（VL模型余额不足）
  
  # VL视觉语言模型（暂不可用）
  vl:
    provider: "zhipu"
    model: "glm-4v"
    api_key: "${ZHIPUAI_API_KEY}"
    base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
    max_tokens: 1000
    temperature: 0.5
    enabled: false  # 暂时禁用

# Embedding配置（暂不可用）
embedding:
  provider: "zhipu"
  model: "embedding-2"
  api_key: "${ZHIPUAI_API_KEY}"
  base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
  dimension: 1024
  enabled: false  # 暂时禁用，使用备用方案

# 备用Embedding方案（本地）
embedding_fallback:
  enabled: true
  provider: "local"
  model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  dimension: 384

# Agent配置
agents:
  max_iterations: 10
  timeout: 60
  retry_attempts: 3
  
  # 推理策略
  reasoning_strategies:
    - elimination  # 排除法
    - deductive    # 演绎法
    - inductive    # 归纳法
    - abductive    # 溯因法

# RAG配置
rag:
  # 双路径融合
  fusion_method: "weighted"  # weighted/voting/hybrid
  
  # RAG-Anything路径
  rag_anything:
    enabled: true
    top_k: 5
    score_threshold: 0.7
  
  # Agentic RAG路径
  agentic_rag:
    enabled: true
    max_iterations: 3
    reflection_enabled: true

# 可视化配置
visualization:
  enabled: true
  theme: "matrix"  # 黑客帝国主题
  graph_layout: "force_directed"
  animation_enabled: true

# WebUI配置
webui:
  host: "0.0.0.0"
  port: 7860
  debug: false
  auth_enabled: true
  default_username: "demo"
  default_password: "REDACTED_DEMO_PASSWORD"

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
  file: "logs/detective_rag.log"

# 性能配置
performance:
  cache_enabled: true
  cache_ttl: 3600
  parallel_requests: true
  max_workers: 2
